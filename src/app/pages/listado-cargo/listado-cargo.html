<div class="container mt-2">
    <h2>Gestión de Cargos</h2>
    <hr>
    <button class="btn btn-primary" (click)="openNewCargo()">Nuevo</button>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Id</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            @for (cargo of cargos().content; track $index) {
                <tr>
                    <td>{{ cargo.id }}</td>
                    <td>{{ cargo.descripcion }}</td>
                    <td>{{ cargo.estado ? 'Activo' : 'Inactivo' }}</td>
                    <td>
                        <button class="btn btn-secondary me-2"
                                title="Ver"
                                (click)="openViewCargo(cargo.id)">
                            <i class="bi bi-eye"></i>
                        </button>

                        <button class="btn btn-warning me-2"
                                title="Editar"
                                (click)="openEditCargo(cargo.id)">
                            <i class="bi bi-pencil"></i>
                        </button>

                        <button class="btn btn-danger"
                                title="Eliminar"
                                (click)="removeCargo(cargo.id)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            }
        </tbody>
    </table>
    <nav aria-label="Page navigation example">
        <ul class="pagination justify-content-end">
            <li class="page-item " >
                <button class="page-link" (click)="loadCargos(1)"><<</button>
            </li>
            @for(i of ranges(cargos().page.totalPages); track i) {
            <li class="page-item">
                <button class="page-link" (click)="loadCargos(i)">{{i}}</button>
            </li>
            }
            <li class="page-item" >
                <button class="page-link" (click)="loadCargos(cargos().page!.totalPages)">>></button>
            </li>
        </ul>
    </nav>
</div>
